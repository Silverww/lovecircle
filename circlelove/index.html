<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>马子潇的恋爱循环</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Particles Background -->
    <div id="particles-container"></div>

    <!-- Title Screen -->
    <div id="title-screen" class="screen active">
        <div class="title-content">
            <h1 class="game-title">马子潇的恋爱循环</h1>
            <p class="subtitle">Love Loop</p>
            <div class="title-buttons">
                <button class="btn btn-primary" onclick="startNewGame()">开始游戏</button>
                <button class="btn btn-secondary" onclick="showLoadScreen()">读取存档</button>
                <button class="btn btn-secondary" onclick="showGallery()">结局画廊</button>
                <button class="btn btn-secondary" onclick="showBranchViewer()">分支查看器</button>
            </div>
            <div class="completion-display">
                <span id="completion-rate-title">全结局收集进度：0%</span>
            </div>
        </div>
    </div>

    <!-- Load Screen -->
    <div id="load-screen" class="screen">
        <h2>读取存档</h2>
        <div id="save-slots" class="save-slots"></div>
        <button class="btn btn-back" onclick="showTitleScreen()">返回</button>
    </div>

    <!-- Gallery Screen -->
    <div id="gallery-screen" class="screen">
        <h2>结局画廊</h2>
        <div id="gallery-grid" class="gallery-grid"></div>
        <button class="btn btn-back" onclick="showTitleScreen()">返回</button>
    </div>

    <!-- Main Game Screen -->
    <div id="game-screen" class="screen">
        <!-- Background Layer -->
        <div id="background-layer"></div>

        <!-- Character Layer -->
        <div id="character-layer">
            <div id="character-left" class="character-sprite"></div>
            <div id="character-right" class="character-sprite"></div>
        </div>

        <!-- JYB Float Text -->
        <div id="jyb-float" class="jyb-float"></div>

        <!-- Main Content Area -->
        <div class="game-main">
            <!-- Flowchart Panel -->
            <aside id="flowchart-panel" class="flowchart-panel">
                <h3>路线图</h3>
                <div id="flowchart-content" class="flowchart-content"></div>
            </aside>

            <!-- Narrative Area -->
            <div class="narrative-area">
                <div id="narrative-box" class="narrative-box">
                    <div id="monologue-box" class="monologue-box">
                        <p id="monologue-text" class="monologue-text"></p>
                    </div>
                    <div id="dialogue-box" class="dialogue-box">
                        <div class="speaker-name" id="speaker-name"></div>
                        <p id="dialogue-text" class="dialogue-text"></p>
                    </div>
                </div>

                <!-- Choice Panel -->
                <div id="choice-panel" class="choice-panel"></div>
            </div>
        </div>

        <!-- Save Slots Overlay -->
        <div id="save-overlay" class="overlay">
            <h3>保存游戏</h3>
            <div id="save-slots-game" class="save-slots"></div>
            <button class="btn btn-cancel" onclick="closeSaveOverlay()">取消</button>
        </div>

        <!-- Game Menu -->
        <div class="game-menu">
            <button class="menu-btn" onclick="openSaveOverlay()">存档</button>
            <button class="menu-btn" onclick="openLoadScreen()">读档</button>
            <button class="menu-btn" onclick="openSettings()">设置</button>
            <button class="menu-btn" onclick="returnToTitle()">标题</button>
        </div>

        <!-- Status Display -->
        <div class="status-display">
            <span id="love-display">好感度: 20</span>
            <span id="obsession-display">占有欲: 20</span>
        </div>
    </div>

    <!-- Settings Panel -->
    <div id="settings-panel" class="overlay">
        <h3>设置</h3>
        <div class="setting-item">
            <label>文字速度</label>
            <input type="range" id="text-speed" min="1" max="5" value="3">
        </div>
        <div class="setting-item">
            <label>BGM音量</label>
            <input type="range" id="bgm-volume" min="0" max="100" value="50">
        </div>
        <div class="setting-item">
            <label>SE音量</label>
            <input type="range" id="se-volume" min="0" max="100" value="70">
        </div>
        <button class="btn btn-cancel" onclick="closeSettings()">关闭</button>
    </div>

    <!-- Error Display -->
    <div id="error-display" class="overlay">
        <div class="error-content">
            <h2>加载失败</h2>
            <p id="error-message"></p>
            <button class="btn btn-primary" onclick="location.reload()">重新加载</button>
        </div>
    </div>

    <!-- Branch Viewer Overlay -->
    <div id="branch-viewer" class="overlay">
        <div class="branch-viewer-content">
            <div class="branch-header">
                <h3>分支查看器</h3>
                <button class="btn btn-cancel" onclick="closeBranchViewer()">关闭</button>
            </div>
            <div id="branch-tree" class="branch-tree"></div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Create floating particles
        function createParticles() {
            const container = document.getElementById('particles-container');
            const particleCount = 30;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';

                const size = Math.random() * 8 + 3;
                const left = Math.random() * 100;
                const delay = Math.random() * 15;
                const duration = Math.random() * 15 + 15;

                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${left}%;
                    animation-delay: ${delay}s;
                    animation-duration: ${duration}s;
                `;

                container.appendChild(particle);
            }
        }

        document.addEventListener('DOMContentLoaded', createParticles);
    </script>
</body>
</html>
